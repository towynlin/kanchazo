name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "24"

jobs:
  lint:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run lint

  unit-integration:
    name: Unit & integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: kanchazo
          POSTGRES_PASSWORD: kanchazo
          POSTGRES_DB: kanchazo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://kanchazo:kanchazo@localhost:5432/kanchazo_test
      SESSION_SECRET: ci-test-secret-not-for-production
      SMS_PROVIDER: logger
      EMAIL_PROVIDER: logger
      WEBAUTHN_RP_NAME: Kanchazo
      WEBAUTHN_RP_ID: localhost
      WEBAUTHN_ORIGIN: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Run unit tests
        run: npm run test:unit
      - name: Run integration tests
        run: npm run test:integration

  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://placeholder/placeholder
      SESSION_SECRET: placeholder
      SMS_PROVIDER: logger
      EMAIL_PROVIDER: logger
      WEBAUTHN_RP_NAME: Kanchazo
      WEBAUTHN_RP_ID: localhost
      WEBAUTHN_ORIGIN: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run build

  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: kanchazo
          POSTGRES_PASSWORD: kanchazo
          POSTGRES_DB: kanchazo
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://kanchazo:kanchazo@localhost:5432/kanchazo
      SESSION_SECRET: ci-test-secret
      SMS_PROVIDER: logger
      EMAIL_PROVIDER: logger
      WEBAUTHN_RP_NAME: Kanchazo
      WEBAUTHN_RP_ID: localhost
      WEBAUTHN_ORIGIN: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium webkit
      - run: npm run migrate
      - run: npm run build
      - name: Run E2E tests
        run: npm run test:e2e
